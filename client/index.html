<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SurveyAgent — The Open-Source AI Survey Platform</title>
    <meta name="description" content="Stop sending static forms. SurveyAgent interviews your users with AI — via text, voice, or video avatar. Self-host it. Plug in any LLM. Own your data." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://getsurveyagent.com" />
    <meta property="og:title" content="SurveyAgent — AI interviews your users for you" />
    <meta property="og:description" content="Stop sending static forms. Every respondent gets a 1-on-1 AI interview that listens, adapts, and digs deeper. Open source. Self-hostable. Your data." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SurveyAgent" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://getsurveyagent.com/og-image.png" />

    <!-- Google Fonts: DM Sans (body) + Instrument Serif (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
